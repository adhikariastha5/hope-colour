<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>What Colour is Hope?</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #070707;
      color: #fff;
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 28px;
    }

    .title-block { text-align: center; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #c9a84c;
      text-transform: none;
    }

    .layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* title + canvases pushed down together, spectrum stays at top */
    .main-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding-top: 52px;
    }

    .canvases-row {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── Colour preview panel ───────────────────────────── */
    .spectrum-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 80px;
      padding-top: 80px;
    }
    .panel-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.22em;
      color: #2c2c2c;
      text-transform: uppercase;
    }

    .color-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .color-swatch {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      transition: background-color 0.12s, box-shadow 0.12s;
    }
    .color-name {
      font-size: 0.72rem;
      font-style: italic;
      color: #3a3a3a;
      letter-spacing: 0.06em;
      text-align: center;
      min-height: 1em;
      transition: color 0.3s;
    }

    /* ── Canvases ────────────────────────────────────────── */
    .frame-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .frame-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.22em;
      color: #262626;
      text-transform: uppercase;
    }
    canvas { display: block; }
    #liveCanvas {
      border: 1px solid #151515;
      transition: box-shadow 0.18s ease;
    }
    #collectiveCanvas { border: 1px solid #131313; }
    #count {
      font-family: 'Space Mono', monospace;
      font-size: 0.52rem;
      color: #252525;
      letter-spacing: 0.14em;
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ── Selected colour preview ─────────────────────────── -->
  <div class="spectrum-panel">
    <div class="panel-label">Selected</div>
    <div class="color-preview">
      <div class="color-swatch" id="colorSwatch"></div>
      <div class="color-name" id="colorName">—</div>
    </div>
  </div>

  <!-- ── Title + canvases pushed down ────────────────────── -->
  <div class="main-content">

    <div class="title-block">
      <h1>What Colour is Hope?</h1>
    </div>

    <div class="canvases-row">
      <!-- Live canvas -->
      <div class="frame-wrap">
        <div class="frame-label">Your Search</div>
        <canvas id="liveCanvas" width="560" height="420"></canvas>
      </div>

      <!-- Collective canvas -->
      <div class="frame-wrap">
        <div class="frame-label">Collective</div>
        <canvas id="collectiveCanvas" width="320" height="420"></canvas>
        <div id="count">0 responses</div>
      </div>
    </div>

  </div>

</div>

<video id="video" style="display:none" playsinline></video>

<!-- No selfie segmentation needed anymore -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ── DOM refs ───────────────────────────────────────────────────────────────
const liveCanvas    = document.getElementById('liveCanvas');
const liveCtx       = liveCanvas.getContext('2d');
const W = liveCanvas.width, H = liveCanvas.height;

const collectiveCanvas = document.getElementById('collectiveCanvas');
const collectiveCtx    = collectiveCanvas.getContext('2d');
const CW = collectiveCanvas.width, CH = collectiveCanvas.height;

const video         = document.getElementById('video');
const countEl       = document.getElementById('count');
const colorSwatch   = document.getElementById('colorSwatch');
const colorNameEl   = document.getElementById('colorName');

// ── Offscreen palette canvas (generated once) ─────────────────────────────
const paletteCanvas = document.createElement('canvas');
paletteCanvas.width = W;
paletteCanvas.height = H;
const palCtx = paletteCanvas.getContext('2d');

// Shared palette math — used by both the palette texture and the hand→colour mapping
function paletteAt(yNorm) {
  // Top (0) = white/light, middle (0.5) = vivid saturated, bottom (1) = black/dark
  const lightness  = 97 - yNorm * 94;                          // 97 → 3
  // Saturation: low at top (pastels/whites), peaks in the mid zone, drops to 0 at
  // the very bottom (greys/blacks). sin curve with a slight bias toward the upper half.
  const saturation = 95 * Math.sin(Math.pow(yNorm, 0.6) * Math.PI); // 0 → ~95 → 0
  return { s: Math.max(saturation, 0), l: lightness };
}

(function buildPalette() {
  const cols = W, rows = H;
  const imgData = palCtx.createImageData(cols, rows);
  for (let y = 0; y < rows; y++) {
    const yNorm = y / rows;
    const { s: saturation, l: lightness } = paletteAt(yNorm);
    for (let x = 0; x < cols; x++) {
      const hue = (x / cols) * 360;
      const [r, g, b] = hslToRgb(hue, saturation, lightness);
      const i = (y * cols + x) * 4;
      imgData.data[i]     = r;
      imgData.data[i + 1] = g;
      imgData.data[i + 2] = b;
      imgData.data[i + 3] = 255;
    }
  }
  palCtx.putImageData(imgData, 0, 0);
})();

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
  return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
}

// ── Particles ──────────────────────────────────────────────────────────────
const PARTICLES = Array.from({ length: 40 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 2 + 0.4,
  vy: -(Math.random() * 0.45 + 0.1),
  vx: (Math.random() - 0.5) * 0.22,
  a: Math.random() * 0.25 + 0.04,
}));

function tickParticles() {
  PARTICLES.forEach(p => {
    p.y += p.vy; p.x += p.vx;
    if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
    if (p.x < 0 || p.x > W) p.x = Math.random() * W;
  });
}

function drawParticles() {
  PARTICLES.forEach(p => {
    liveCtx.beginPath();
    liveCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    liveCtx.fillStyle = `hsla(${currentHue},${currentSat}%,${currentLight + 20}%,${p.a})`;
    liveCtx.fill();
  });
}

// ── Colour name ────────────────────────────────────────────────────────────
function hueName(h) {
  h = ((h % 360) + 360) % 360;
  if (h < 12)  return 'red';
  if (h < 35)  return 'orange';
  if (h < 62)  return 'yellow';
  if (h < 88)  return 'chartreuse';
  if (h < 150) return 'green';
  if (h < 182) return 'teal';
  if (h < 210) return 'cyan';
  if (h < 255) return 'blue';
  if (h < 275) return 'indigo';
  if (h < 315) return 'violet';
  if (h < 340) return 'magenta';
  return 'crimson';
}

// ── State ──────────────────────────────────────────────────────────────────
let landmarks = null;
let handX = 0.5, handY = 0.5;
let currentHue = 200, currentSat = 62, currentLight = 48;
let fistClosed = false, lastFist = false;
let savedColors = [];
let frame = 0, handVisible = false, cameraReady = false;
let flashFrames = 0;
let lastHueName = '';

// ── MediaPipe: Hands only ──────────────────────────────────────────────────
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
  maxNumHands: 1, modelComplexity: 1,
  minDetectionConfidence: 0.72, minTrackingConfidence: 0.65,
});
hands.onResults(r => {
  if (!r.multiHandLandmarks?.length) {
    handVisible = false; landmarks = null; return;
  }
  handVisible = true;
  landmarks   = r.multiHandLandmarks[0];

  const palm = landmarks[9];
  handX = 1 - palm.x; // mirror
  handY = palm.y;

  // Fist detection: check if all fingertips are curled toward the palm
  const tips = [8, 12, 16, 20]; // index, middle, ring, pinky tips
  const avgDist = tips.reduce((sum, i) =>
    sum + Math.hypot(landmarks[i].x - palm.x, landmarks[i].y - palm.y), 0) / 4;
  fistClosed = avgDist < 0.08;
  if (fistClosed && !lastFist) selectColour();
  lastFist = fistClosed;
});

// ── Camera ─────────────────────────────────────────────────────────────────
new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
    if (!cameraReady) cameraReady = true;
  },
  width: 640, height: 480,
}).start().catch(() => {
  liveCtx.fillStyle = '#111'; liveCtx.fillRect(0, 0, W, H);
  liveCtx.fillStyle = '#444'; liveCtx.font = '13px Georgia';
  liveCtx.textAlign = 'center';
  liveCtx.fillText('Allow camera access then refresh', W / 2, H / 2);
});

// ── Main render loop ───────────────────────────────────────────────────────
function render() {
  frame++;
  if (flashFrames > 0) flashFrames--;

  // Map hand position to palette coordinates (must match palette generation)
  const spd = handVisible ? 0.13 : 0.013;
  const clampedY = Math.max(0, Math.min(1, handY));
  const { s: palS, l: palL } = paletteAt(clampedY);
  const targetHue   = Math.max(0, Math.min(360, handX * 360));
  const targetSat   = palS;
  const targetLight = palL;
  currentHue   = lerp(currentHue,   targetHue,   spd);
  currentSat   = lerp(currentSat,   targetSat,   spd);
  currentLight = lerp(currentLight, targetLight,  spd);

  const hsl = `hsl(${currentHue},${currentSat}%,${currentLight}%)`;

  // ── Sidebar swatch ────────────────────────────────────────────────────
  colorSwatch.style.backgroundColor = hsl;
  colorSwatch.style.boxShadow = `0 0 22px ${hsl}55`;

  const name = hueName(currentHue);
  if (name !== lastHueName) {
    colorNameEl.textContent = name;
    colorNameEl.style.color = hsl;
    lastHueName = name;
  }

  liveCanvas.style.boxShadow =
    `0 0 40px hsla(${currentHue},${currentSat}%,${currentLight}%,0.28),
     0 0 90px hsla(${currentHue},${currentSat}%,${currentLight}%,0.1)`;

  // ── Canvas: clear ─────────────────────────────────────────────────────
  liveCtx.fillStyle = '#0a0a0a';
  liveCtx.fillRect(0, 0, W, H);

  // ── Video feed (dimmed, under the palette) ────────────────────────────
  if (cameraReady) {
    liveCtx.save();
    liveCtx.globalAlpha = 0.25;
    liveCtx.filter = 'grayscale(0.7) brightness(0.6)';
    liveCtx.translate(W, 0);
    liveCtx.scale(-1, 1);
    liveCtx.drawImage(video, 0, 0, W, H);
    liveCtx.restore();
  }

  // ── Colour palette overlay ────────────────────────────────────────────
  liveCtx.save();
  liveCtx.globalAlpha = 0.72;
  liveCtx.drawImage(paletteCanvas, 0, 0);
  liveCtx.restore();

  // ── Cursor: show what colour the hand is on ───────────────────────────
  if (handVisible) {
    const cx = handX * W, cy = handY * H;

    // Outer ring — white for visibility
    liveCtx.beginPath();
    liveCtx.arc(cx, cy, 22, 0, Math.PI * 2);
    liveCtx.strokeStyle = 'rgba(255,255,255,0.7)';
    liveCtx.lineWidth = 2;
    liveCtx.stroke();

    // Inner filled circle — the actual selected colour
    liveCtx.beginPath();
    liveCtx.arc(cx, cy, 18, 0, Math.PI * 2);
    liveCtx.fillStyle = hsl;
    liveCtx.fill();
    liveCtx.strokeStyle = 'rgba(0,0,0,0.5)';
    liveCtx.lineWidth = 1;
    liveCtx.stroke();

    // Crosshair lines
    liveCtx.strokeStyle = 'rgba(255,255,255,0.35)';
    liveCtx.lineWidth = 0.5;
    liveCtx.beginPath();
    liveCtx.moveTo(cx - 30, cy); liveCtx.lineTo(cx - 24, cy);
    liveCtx.moveTo(cx + 24, cy); liveCtx.lineTo(cx + 30, cy);
    liveCtx.moveTo(cx, cy - 30); liveCtx.lineTo(cx, cy - 24);
    liveCtx.moveTo(cx, cy + 24); liveCtx.lineTo(cx, cy + 30);
    liveCtx.stroke();

    // Colour name label next to cursor
    liveCtx.font = 'italic 12px Cormorant Garamond, Georgia, serif';
    liveCtx.fillStyle = 'rgba(255,255,255,0.85)';
    liveCtx.textAlign = 'left';
    liveCtx.fillText(name, cx + 28, cy + 5);
  }

  // ── Particles (drawn on top, screen blend so they glow through) ───────
  liveCtx.globalCompositeOperation = 'screen';
  tickParticles();
  drawParticles();
  liveCtx.globalCompositeOperation = 'source-over';

  // ── Hand indicators ────────────────────────────────────────────────────
  if (landmarks) drawHandUI();

  // ── Vignette ──────────────────────────────────────────────────────────
  const vig = liveCtx.createRadialGradient(W / 2, H / 2, H * 0.18, W / 2, H / 2, H * 0.88);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.6)');
  liveCtx.fillStyle = vig;
  liveCtx.fillRect(0, 0, W, H);

  // ── Selection flash ────────────────────────────────────────────────────
  if (flashFrames > 0) {
    const a = (flashFrames / 14) * 0.35;
    liveCtx.fillStyle = `hsla(${currentHue},${currentSat}%,${currentLight + 25}%,${a})`;
    liveCtx.fillRect(0, 0, W, H);
  }

  // ── Instructions ──────────────────────────────────────────────────────
  drawInstructions();

  requestAnimationFrame(render);
}

// ── Hand UI ────────────────────────────────────────────────────────────────
function drawHandUI() {
  const palm = landmarks[9];
  const cx = (1 - palm.x) * W, cy = palm.y * H;

  // Measure how closed the fist is (0 = open, 1 = fully closed)
  const tips = [8, 12, 16, 20];
  const avgDist = tips.reduce((sum, i) =>
    sum + Math.hypot(landmarks[i].x - palm.x, landmarks[i].y - palm.y), 0) / 4;
  const t = Math.max(0, Math.min(1, 1 - avgDist / 0.16));
  const col = `hsla(${currentHue},75%,88%,${0.35 + t * 0.6})`;

  // Draw fingertip dots
  tips.forEach(i => {
    const fx = (1 - landmarks[i].x) * W, fy = landmarks[i].y * H;
    dot(fx, fy, 3.5 + t * 2, col);
  });

  // Ring around palm that fills as fist closes
  const r = 18 + (1 - t) * 16;
  liveCtx.beginPath();
  liveCtx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (t || 0.01));
  liveCtx.strokeStyle = `hsla(${currentHue},80%,92%,${0.25 + t * 0.75})`;
  liveCtx.lineWidth = 2 + t * 1.5;
  liveCtx.stroke();

  // Palm center dot
  dot(cx, cy, 5 + t * 3, col);

  if (t > 0.5) {
    liveCtx.font = 'italic 11px Cormorant Garamond, Georgia, serif';
    liveCtx.fillStyle = `hsla(${currentHue},70%,90%,${t})`;
    liveCtx.textAlign = 'center';
    liveCtx.fillText(fistClosed ? 'saved ✓' : 'close fist…', cx, cy - r - 7);
  }
}

function dot(x, y, r, c) {
  liveCtx.beginPath();
  liveCtx.arc(x, y, r, 0, Math.PI * 2);
  liveCtx.fillStyle = c;
  liveCtx.fill();
}

// ── Instructions ───────────────────────────────────────────────────────────
function drawInstructions() {
  liveCtx.font = 'italic 13px Cormorant Garamond, Georgia, serif';
  liveCtx.textAlign = 'center';
  const y = H - 14;

  if (!cameraReady) {
    liveCtx.fillStyle = 'rgba(100,100,100,0.55)';
    liveCtx.fillText('Loading…', W / 2, y);
  } else if (!handVisible) {
    liveCtx.fillStyle = 'rgba(200,200,200,0.35)';
    liveCtx.fillText('Raise your hand to begin', W / 2, y);
  } else if (fistClosed) {
    liveCtx.fillStyle = `hsla(${currentHue},70%,85%,0.95)`;
    liveCtx.fillText('Colour saved ✓', W / 2, y);
  } else {
    liveCtx.fillStyle = 'rgba(200,200,200,0.28)';
    liveCtx.fillText('Move hand to explore  ·  Close fist to select', W / 2, y);
  }
}

// ── Select colour ──────────────────────────────────────────────────────────
function selectColour() {
  savedColors.push({
    h: Math.round(currentHue)   || 0,
    s: Math.round(currentSat)   || 0,
    l: Math.round(currentLight) || 50,
  });
  flashFrames = 14;
  redrawCollective();
}

// ── Collective canvas ──────────────────────────────────────────────────────

// Group colors by hue proximity
function groupColors(colors) {
  if (colors.length === 0) return [];
  const HUE_GAP = 35; // max hue difference within a group
  // Sort by hue
  const sorted = colors.map((c, i) => ({ ...c, idx: i })).sort((a, b) => a.h - b.h);
  const groups = [{ colors: [sorted[0]] }];
  for (let i = 1; i < sorted.length; i++) {
    const prev = groups[groups.length - 1];
    const avgH = prev.colors.reduce((s, c) => s + c.h, 0) / prev.colors.length;
    // Also handle wrap-around (e.g. 350° and 10° are close)
    const diff = Math.min(
      Math.abs(sorted[i].h - avgH),
      360 - Math.abs(sorted[i].h - avgH)
    );
    if (diff < HUE_GAP) {
      prev.colors.push(sorted[i]);
    } else {
      groups.push({ colors: [sorted[i]] });
    }
  }
  // Compute group averages
  groups.forEach(g => {
    const n = g.colors.length;
    g.avgH = g.colors.reduce((s, c) => s + c.h, 0) / n;
    g.avgS = g.colors.reduce((s, c) => s + c.s, 0) / n;
    g.avgL = g.colors.reduce((s, c) => s + c.l, 0) / n;
  });
  return groups;
}

function redrawCollective() {
  collectiveCtx.fillStyle = '#070707';
  collectiveCtx.fillRect(0, 0, CW, CH);

  const n = savedColors.length;
  countEl.textContent = `${n} response${n === 1 ? '' : 's'}`;

  if (n === 0) {
    collectiveCtx.fillStyle = '#1a1a1a';
    collectiveCtx.font = 'italic 13px Cormorant Garamond, Georgia, serif';
    collectiveCtx.textAlign = 'center';
    collectiveCtx.fillText('Waiting for first response…', CW / 2, CH / 2);
    return;
  }

  const groups = groupColors(savedColors);
  const padding = 40;
  const usableW = CW - padding * 2;
  const usableH = CH - padding * 2;
  const centerX = CW / 2, centerY = CH / 2;

  // Position groups in a circular layout if multiple, centered if one
  groups.forEach((g, gi) => {
    if (groups.length === 1) {
      g.cx = centerX;
      g.cy = centerY;
    } else {
      const angle = (gi / groups.length) * Math.PI * 2 - Math.PI / 2;
      const spread = Math.min(usableW, usableH) * 0.3;
      g.cx = centerX + Math.cos(angle) * spread;
      g.cy = centerY + Math.sin(angle) * spread;
    }
  });

  // ── Weight: how dominant is each group? ─────────────────────────────────
  const maxCount = Math.max(...groups.map(g => g.colors.length));

  // 'screen' blend — colors mix without blowing out to white
  collectiveCtx.globalCompositeOperation = 'screen';

  groups.forEach(g => {
    const count = g.colors.length;
    // weight 0→1 based on how popular this group is vs the most popular
    const weight = count / maxCount;

    // Radius & opacity scale with weight — popular groups are bigger + deeper
    const minR = Math.min(usableW, usableH) * 0.12;
    const maxR = Math.min(usableW, usableH) * 0.46;
    const groupR = minR + weight * (maxR - minR);

    // Popular groups get higher opacity (deeper color), but capped low to avoid white
    const alpha = 0.08 + weight * 0.32;           // 0.08 (rare) → 0.40 (dominant)

    // Draw each color as a soft circle within the group
    g.colors.forEach((c, ci) => {
      let cx, cy;
      if (count === 1) {
        cx = g.cx;
        cy = g.cy;
      } else {
        const a = (ci / count) * Math.PI * 2 + g.avgH * 0.017;
        const ring = Math.floor(ci / 6);
        const dist = 12 + ring * 14 + (ci % 6) * 3;
        cx = g.cx + Math.cos(a) * Math.min(dist, groupR * 0.65);
        cy = g.cy + Math.sin(a) * Math.min(dist, groupR * 0.65);
      }

      const r = Math.max(16, groupR * 0.5);

      // Steeper falloff — color concentrated in center, fades quickly
      const grad = collectiveCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
      grad.addColorStop(0,   `hsla(${c.h},${c.s}%,${c.l}%,${alpha})`);
      grad.addColorStop(0.25,`hsla(${c.h},${c.s}%,${c.l}%,${alpha * 0.5})`);
      grad.addColorStop(0.55,`hsla(${c.h},${c.s}%,${c.l}%,${alpha * 0.12})`);
      grad.addColorStop(1,   `hsla(${c.h},${c.s}%,${c.l}%,0)`);

      collectiveCtx.beginPath();
      collectiveCtx.arc(cx, cy, r, 0, Math.PI * 2);
      collectiveCtx.fillStyle = grad;
      collectiveCtx.fill();
    });

  });

  // Newest colour indicator
  collectiveCtx.globalCompositeOperation = 'source-over';
  const lastGroup = groups.find(g => g.colors.some(c => c.idx === n - 1));
  if (lastGroup) {
    const nc = lastGroup.colors.find(c => c.idx === n - 1);
    const ni = lastGroup.colors.indexOf(nc);
    const count = lastGroup.colors.length;
    const weight = count / maxCount;
    const groupR = Math.min(usableW, usableH) * 0.12 + weight * (Math.min(usableW, usableH) * 0.34);
    let nx, ny;
    if (count === 1) {
      nx = lastGroup.cx; ny = lastGroup.cy;
    } else {
      const a = (ni / count) * Math.PI * 2 + lastGroup.avgH * 0.017;
      const ring = Math.floor(ni / 6);
      const dist = 12 + ring * 14 + (ni % 6) * 3;
      nx = lastGroup.cx + Math.cos(a) * Math.min(dist, groupR * 0.65);
      ny = lastGroup.cy + Math.sin(a) * Math.min(dist, groupR * 0.65);
    }
    collectiveCtx.beginPath();
    collectiveCtx.arc(nx, ny, 5, 0, Math.PI * 2);
    collectiveCtx.strokeStyle = 'rgba(255,255,255,0.45)';
    collectiveCtx.lineWidth = 1.5;
    collectiveCtx.stroke();
  }
}

// ── Fallbacks ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); selectColour(); }
});
liveCanvas.addEventListener('mousemove', e => {
  if (handVisible) return;
  const r = liveCanvas.getBoundingClientRect();
  handX = (e.clientX - r.left) / W;
  handY = (e.clientY - r.top) / H;
});
liveCanvas.addEventListener('click', () => { if (!handVisible) selectColour(); });

function lerp(a, b, t) { return a + (b - a) * t; }

redrawCollective();
render();
</script>
